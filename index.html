<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Emilia Lundqvist | Level Designer</title>
    <style>
        /* Grundstilar */
        body {
            font-family: 'Helvetica', 'Arial', sans-serif;
            margin: 0;
            background: #fff;
            color: #111;
            text-align: center;
        }

        /* Header / Navigering */
        header {
            padding: 15px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        header nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #000;
        }

        /* Banner (Hero-sektionen) */
        .hero {
            width: 100%;
            height: 300px;
            background: url('din-banner-bild.jpg') center/cover no-repeat; /* Byt ut bilden! */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-title {
            background: white;
            padding: 15px 30px;
            border: 1px solid #000;
            text-transform: uppercase;
        }

        .hero-title h1 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 2px;
        }

        /* Projekt-sektionen */
        .projects-title {
            font-family: 'Georgia', serif; /* För att få den klassiska looken */
            font-size: 45px;
            margin: 50px 0;
            font-weight: normal;
        }

        .project-container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .project {
            position: relative;
            margin-bottom: 40px;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        /* Bilden */
        .project img {
            width: 80%;
            display: block;
            margin: 0 auto;
        }

        /* Textrutan som ligger OVANPÅ bilden till vänster */
        .project-info {
            position: absolute;
            top: 60px;
            left: 5%;
            background: rgba(255, 255, 255, 0.95);
            padding: 20px;
            text-align: left;
            border: 1px solid #ddd;
            min-width: 150px;
            z-index: 10;
        }

        .project-info h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            letter-spacing: 1px;
        }

        .project-info p {
            margin: 0;
            font-size: 11px;
            line-height: 1.6;
            text-transform: uppercase;
            color: #666;
        }

        /* Knappen "Read more" nere till höger */
        .read-more {
            position: absolute;
            bottom: 20px;
            right: 12%;
            background: white;
            padding: 8px 15px;
            border: 1px solid #ccc;
            text-decoration: none;
            color: #000;
            font-size: 12px;
            font-weight: bold;
        }

    </style>
</head>
<body>

<header>
    <div><strong>EMILIA LUNDQVIST</strong> | level designer</div>
    <nav>
        <a href="#">projects</a>
        <a href="#">about me</a>
    </nav>
</header>

<div class="hero">
    <div class="hero-title">
        <h1>EMILIA LUNDQVIST</h1>
        <small>level designer</small>
    </div>
</div>

<h2 class="projects-title">projects ↓</h2>

<div class="project-container">

    <div class="project">
        <div class="project-info">
            <h3>SONDER</h3>
            <p>UNREAL ENGINE 4<br>BLUEPRINTS<br>3 WEEKS<br>GROUP PROJECT (10)</p>
        </div>
        <img src="projekt-bild-1.jpg" alt="Sonder">
        <a href="#" class="read-more">READ MORE ></a>
    </div>

    <div class="project">
        <div class="project-info">
            <h3>SPACE LEEK</h3>
            <p>UNREAL ENGINE 5<br>BLUEPRINTS<br>TRELLO<br>GROUP PROJECT (5)</p>
        </div>
        <img src="projekt-bild-2.jpg" alt="Space Leek">
        <a href="#" class="read-more">READ MORE ></a>
    </div>

</div>

</body>
</html>
